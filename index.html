<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dora Luz y Raúl</title>

    <style>
        #pantallaInicio {
            position: fixed;
            inset: 0;
            background: rgba(168, 178, 161, 0.92);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: Georgia, serif;
            cursor: pointer;
        }

        #pantallaInicio div {
            padding: 30px;
            color: #7a4a3a;
            font-size: 22px;
        }
    </style>
</head>

<body>

    <div id="pantallaInicio">
        <div>
            ✨ Toca para abrir la invitación ✨
        </div>
    </div>
    
    <div style="position: center; width: 100%; height: 0; padding-top: 401.0981%;
    padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
    margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
    border-radius: 8px; will-change: transform;">

        <iframe loading="lazy"
            style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
            src="https://www.canva.com/design/DAHM5gPBwys/8U8GM1IHCq4u5etpVIAWdQ/view?embed">
        </iframe>
    </div>

    <audio id="bgMusic" loop>
        <source src="sky.mp3" type="audio/mp3">
    </audio>

    <script>
        const pantallaInicio = document.getElementById('pantallaInicio');
        const audio = document.getElementById('bgMusic');

        pantallaInicio.addEventListener('click', () => {
            audio.play()
                .then(() => {
                    pantallaInicio.style.display = 'none';
                })
                .catch(error => {
                    console.log('No se pudo reproducir el audio:', error);
                });
        });
    </script>

</body>
</html>
